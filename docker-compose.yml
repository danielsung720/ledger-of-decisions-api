services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ledger-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_local_dev}
      CACHE_STORE_FALLBACK: database
    depends_on:
      - redis
    networks:
      - ledger-network

  nginx:
    image: nginx:alpine
    container_name: ledger-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ledger-network

  redis:
    image: redis:7-alpine
    container_name: ledger-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_local_dev}
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_local_dev}
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-redis_local_dev}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ledger-network

networks:
  ledger-network:
    driver: bridge
