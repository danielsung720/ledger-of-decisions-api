name: Deploy to Fly.io

on:
  push:
    branches:
      - master

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, mbstring, bcmath, intl
          coverage: none

      - name: Create required directories
        run: mkdir -p bootstrap/cache storage/logs storage/framework/cache storage/framework/sessions storage/framework/views

      - name: Install dependencies
        run: composer install --optimize-autoloader --no-interaction

      - name: PHP CodeSniffer (PSR-12)
        run: ./vendor/bin/phpcs --standard=phpcs.xml

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=512M --no-progress
        env:
          APP_KEY: base64:dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ=

      - name: Run tests
        run: ./vendor/bin/phpunit
        env:
          APP_KEY: base64:dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ=

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --dockerfile Dockerfile.fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
